global
    log stdout format raw local0
    stats socket /tmp/haproxy.sock mode 666 level admin

defaults
    log global
    mode http
    log-format '{"client_ip":"%ci","date_time":"%t","frontend":"%f","backend":"%b","server":"%s","http_status":"%ST","bytes_read":"%B","http_request":"%r"}'
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend http_front
    bind *:80
    default_backend web_back

backend web_back
    balance roundrobin
    option httpchk GET /
    server backend1 backend1:80 check
    server backend2 backend2:80 check
    server backend3 backend3:80 check

listen stats
    bind *:8080
    stats enable
    stats uri /
    stats refresh 5s
